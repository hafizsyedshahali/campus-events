        <h1>Contact Us</h1>
        <p>Have questions about an upcoming university event? Reach out to our team!</p>
        
        <form style="margin-top: 20px;">
            <label><strong>Name:</strong></label><br>
            <input type="text" name="name" style="margin-bottom: 10px; padding: 5px; width: 80%;"><br>
            
            <label><strong>Email:</strong></label><br>
            <input type="email" name="email" style="margin-bottom: 10px; padding: 5px; width: 80%;"><br>
            
            <label><strong>Message:</strong></label><br>
            <textarea name="message" rows="4" style="margin-bottom: 10px; padding: 5px; width: 80%;"></textarea><br>
            
            <button type="button" style="padding: 10px 15px; background-color: #333; color: white; border: none; cursor: pointer;">Send Message</button>
